[book]
title = "ExpressJS Mastery"
description = "My personal learning notes on ExpressJS and backend development with Node.js"
authors = ["Noman"]
language = "en"

[build]
build-dir = "book"

[output.html]
default-theme = "navy"
git-repository-url = "https://github.com/nomancsediu/ExpressJS_Mastery"
edit-url-template = "https://github.com/nomancsediu/ExpressJS_Mastery/edit/main/{path}"

[output.html.search]
enable = true
limit-results = 30
